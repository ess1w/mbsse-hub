version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mbsse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mbsse_hub
      POSTGRES_USER: mbsse
      POSTGRES_PASSWORD: mbsse_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbsse -d mbsse_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mbsse_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://mbsse:mbsse_secret@postgres:5432/mbsse_hub
      SECRET_KEY: change-me-in-production-use-openssl-rand-hex-32
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        python seed_admin.py &&
        python seed_organisations.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build:
      context: ./prototype
      dockerfile: Dockerfile
    container_name: mbsse_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./prototype:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
