services:
  # ── Frontend (Vite / React) ──────────────────────────────────────────────
  - type: web
    name: mbsse-hub-frontend
    runtime: static
    rootDir: prototype
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Backend (FastAPI) ────────────────────────────────────────────────────
  - type: web
    name: mbsse-hub-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    pullRequestPreviewsEnabled: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mbsse-hub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

  # ── PostgreSQL database ──────────────────────────────────────────────────
databases:
  - name: mbsse-hub-db
    databaseName: mbsse_hub
    plan: free
