services:
  # ── Frontend (Vite / React static site) ─────────────────────────────────────
  - type: web
    name: mbsse-hub-frontend
    runtime: static
    rootDir: prototype
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to the URL of the deployed API service (update after first deploy)
      - key: VITE_API_URL
        value: https://mbsse-hub-api.onrender.com/api/v1
      # Preset.io embedded analytics (Analytics tab).
      # Set to your Preset workspace base URL (no trailing slash, no /superset/... path).
      - key: VITE_PRESET_DOMAIN
        value: https://83f65675.us2a.app.preset.io
      # Dashboard ID from the Preset URL (the part after /p/).
      - key: VITE_PRESET_DASHBOARD_ID
        value: oBMOvaLJDme

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: mbsse-hub-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: sh start.sh
    pullRequestPreviewsEnabled: false
    envVars:
      # Paste the Internal Database URL from your existing Render Postgres instance
      # Dashboard → your database → Info tab → "Internal Database URL"
      - key: DATABASE_URL
        sync: false
      # Auto-generated 256-bit secret for JWT signing
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      # Allow all origins for the prototype; restrict to frontend URL in production
      - key: ALLOWED_ORIGINS
        value: "*"
      # Admin account seeded on first deploy
      - key: ADMIN_EMAIL
        value: admin@mbsse.gov.sl
      - key: ADMIN_PASSWORD
        generateValue: true
      # Preset.io embedded analytics — set these manually in the Render dashboard
      # (never commit API credentials to git)
      - key: PRESET_API_TOKEN
        sync: false
      - key: PRESET_API_SECRET
        sync: false
      - key: PRESET_TEAM
        value: MBSSE
      - key: PRESET_WORKSPACE
        value: SRGBV Hub
